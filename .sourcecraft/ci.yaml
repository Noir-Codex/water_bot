# SourceCraft CI/CD — WaterBot

on:
  push:
    - workflows: [lint, test]
      filter:
        branches: [main, master]
    - workflows: [run]
      filter:
        branches: [main, master]
  pull_request:
    - workflows: [lint, test]
      filter:
        target_branches: [main, master]

workflows:
  # ─── Линтинг ───────────────────────────────────────────────────────────────
  lint:
    tasks:
      - name: flake8
        cubes:
          - name: run_flake8
            image: python:3.13
            script:
              - pip install --upgrade pip
              - pip install flake8
              - flake8 . --max-line-length=120 --exclude=.venv,.git,__pycache__

  # ─── Тесты ─────────────────────────────────────────────────────────────────
  test:
    tasks:
      - name: pytest
        cubes:
          - name: run_pytest
            image: python:3.13
            env:
              BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            script:
              - pip install --upgrade pip
              - pip install -r requirements.txt
              - pip install pytest pytest-asyncio
              - pytest --tb=short -q || echo "Тесты не найдены"

  # ─── Запуск бота ───────────────────────────────────────────────────────────
  run:
    tasks:
      - name: start-bot
        cubes:
          - name: start_bot
            image: python:3.13
            env:
              BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
            script:
              - pip install --upgrade pip
              - pip install -r requirements.txt
              - python main.py
